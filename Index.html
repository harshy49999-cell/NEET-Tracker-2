<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>NEET PG Tracker</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;NEET PG Tracker&quot;,&quot;short_name&quot;:&quot;NEET PG&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#fafaf9&quot;,&quot;theme_color&quot;:&quot;#2563eb&quot;}"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e8ecf0;
    --text: #0f172a;
    --muted: #64748b;
    --faint: #94a3b8;
    --subtle: #f1f5f9;
    --accent: #2563eb;
    --radius: 12px;
    --font: 'Outfit', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Layout */
  #header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px 10px; }
  #header-inner { max-width: 680px; margin: 0 auto; }
  #main { max-width: 680px; margin: 0 auto; padding: 12px 14px 80px; }

  /* Header row */
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .header-title-sm { font-size: 10px; letter-spacing: 0.16em; color: var(--faint); text-transform: uppercase; font-family: var(--mono); margin-bottom: 1px; }
  .header-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .day-section { display: flex; align-items: center; gap: 8px; }
  .day-label { font-size: 9px; color: var(--faint); font-family: var(--mono); letter-spacing: 0.1em; text-align: right; }
  .day-num { font-size: 26px; font-weight: 700; color: var(--accent); font-family: var(--mono); line-height: 1.1; text-align: right; }
  .day-btns { display: flex; flex-direction: column; gap: 4px; }
  .day-btn { width: 28px; height: 24px; border: none; border-radius: 7px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: opacity 0.15s; }
  .day-btn:active { opacity: 0.7; }
  .day-btn.minus { background: var(--subtle); color: var(--muted); }
  .day-btn.plus { background: var(--accent); color: #fff; }

  /* Progress bar */
  .progress-wrap { margin-top: 10px; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .progress-meta span { font-size: 9px; font-family: var(--mono); color: var(--faint); }
  .progress-track { height: 4px; background: var(--subtle); border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#2563eb,#7c3aed); transition: width 0.4s; }

  /* Save status */
  .save-status { font-size: 9px; font-family: var(--mono); }

  /* Active slots grid */
  .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .slot-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .slot-top { display: flex; align-items: center; gap: 7px; }
  .slot-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .slot-name { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-meta { display: flex; justify-content: space-between; margin-top: 5px; }
  .slot-meta span { font-size: 9px; font-family: var(--mono); color: var(--faint); }
  .slot-bar-track { height: 2px; background: var(--subtle); border-radius: 1px; margin-top: 5px; }
  .slot-bar-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }

  /* Ring SVG */
  .ring-wrap { flex-shrink: 0; }

  /* Tabs */
  .tabs { display: flex; gap: 3px; background: var(--subtle); border-radius: 9px; padding: 3px; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 7px 4px; border: none; border-radius: 6px; font-size: 11px; font-family: var(--font); font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--faint); background: transparent; }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px #00000012; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .card-head { padding: 9px 13px 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .card-stripe { width: 3px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
  .card-code { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .card-name { font-size: 13px; font-weight: 700; }
  .card-meta { margin-left: auto; font-size: 9px; font-family: var(--mono); color: var(--faint); }
  .card-body { padding: 6px 10px 8px; }

  /* Lecture rows */
  .lec-row { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 7px; cursor: pointer; transition: background 0.1s; user-select: none; }
  .lec-row:active { background: var(--subtle); }
  .checkbox { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid #cbd5e1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .checkbox.checked { border-color: transparent; }
  .checkbox-tick { color: #fff; font-size: 9px; font-weight: 900; display: none; }
  .checkbox.checked .checkbox-tick { display: block; }
  .lec-info { font-size: 11px; color: var(--muted); flex: 1; }
  .rev-hint { font-size: 9px; color: var(--faint); font-family: var(--mono); text-align: right; flex-shrink: 0; }

  /* Tags */
  .tag { display: inline-flex; align-items: center; gap: 3px; border-radius: 5px; padding: 2px 7px; font-size: 10px; font-family: var(--mono); font-weight: 700; white-space: nowrap; border: 1.5px solid transparent; }
  .tag-code { opacity: 0.6; font-size: 9px; }

  /* Offset badges */
  .off-badge { font-size: 9px; font-family: var(--mono); font-weight: 700; border-radius: 4px; padding: 1px 5px; border: 1px solid transparent; }

  /* Pill */
  .pill { display: inline-flex; align-items: center; border-radius: 20px; padding: 2px 8px; font-size: 9px; font-weight: 700; font-family: var(--mono); }

  /* Revision row */
  .rev-row { display: flex; align-items: center; gap: 7px; padding: 5px 4px; }
  .rev-row + .rev-row { border-top: 1px solid var(--subtle); }

  /* Upcoming day header */
  .upcoming-day { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
  .upcoming-day-pill { background: var(--subtle); padding: 2px 8px; border-radius: 4px; }
  .upcoming-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .upcoming-item { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 4px 8px; }

  /* Subject schedule */
  .subj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; padding: 10px 13px; transition: opacity 0.2s; }
  .subj-card.done { opacity: 0.5; }
  .subj-top { display: flex; align-items: center; gap: 9px; }
  .subj-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .subj-code { font-family: var(--mono); font-size: 10px; font-weight: 700; width: 22px; }
  .subj-name { font-size: 12px; font-weight: 600; flex: 1; }
  .subj-meta { display: flex; justify-content: space-between; margin-top: 6px; }
  .subj-meta span { font-size: 9px; font-family: var(--mono); color: var(--faint); }
  .subj-bar { height: 3px; background: var(--subtle); border-radius: 2px; margin-top: 5px; }
  .subj-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Legend grid */
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; border-radius: 7px; padding: 6px 10px; border: 1px solid transparent; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .legend-code { font-family: var(--mono); font-size: 10px; font-weight: 700; width: 20px; }
  .legend-name { font-size: 11px; color: #475569; }

  /* Section label */
  .section-label { font-size: 10px; font-family: var(--mono); color: var(--faint); letter-spacing: 0.12em; margin: 16px 0 8px; text-transform: uppercase; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 0; color: var(--border); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-text { font-size: 12px; font-family: var(--mono); color: var(--faint); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .fade { animation: fadeUp 0.18s ease; }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div class="header-row">
      <div>
        <div class="header-title-sm">NEET PG</div>
        <div class="header-title">Study Tracker</div>
      </div>
      <div class="day-section">
        <div id="save-status" class="save-status" style="color:#22c55e"></div>
        <div>
          <div class="day-label">STUDY DAY</div>
          <div class="day-num" id="day-display">1</div>
        </div>
        <div class="day-btns">
          <button class="day-btn minus" onclick="changeDay(-1)">−</button>
          <button class="day-btn plus" onclick="changeDay(1)">+</button>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>OVERALL PROGRESS</span>
        <span id="progress-text">0/1447 · 0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div id="main">
  <div class="slots-grid" id="slots-grid"></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('today',this)">Memorise</button>
    <button class="tab-btn" onclick="switchTab('revision',this)">Revise</button>
    <button class="tab-btn" onclick="switchTab('upcoming',this)">Upcoming</button>
    <button class="tab-btn" onclick="switchTab('subjects',this)">Subjects</button>
  </div>
  <div id="tab-content"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const SUBJECTS_RAW = [
  {name:"Medicine",      code:"B",  color:"#2563EB",bg:"#EFF6FF", units:12,lectures:202,batch:1},
  {name:"Surgery",       code:"R",  color:"#DC2626",bg:"#FEF2F2", units:11,lectures:84, batch:1},
  {name:"Obs & Gynae",   code:"P",  color:"#DB2777",bg:"#FDF2F8", units:9, lectures:111,batch:1},
  {name:"Anatomy",       code:"O",  color:"#EA580C",bg:"#FFF7ED", units:8, lectures:216,batch:1},
  {name:"Physiology",    code:"G",  color:"#16A34A",bg:"#F0FDF4", units:10,lectures:62, batch:1},
  {name:"Pediatrics",    code:"Sk", color:"#0284C7",bg:"#F0F9FF", units:15,lectures:55, batch:1},
  {name:"Biochemistry",  code:"Y",  color:"#CA8A04",bg:"#FEFCE8", units:8, lectures:53, batch:2},
  {name:"Pathology",     code:"T",  color:"#0D9488",bg:"#F0FDFA", units:22,lectures:77, batch:2},
  {name:"Pharmacology",  code:"V",  color:"#7C3AED",bg:"#F5F3FF", units:14,lectures:83, batch:2},
  {name:"Microbiology",  code:"L",  color:"#65A30D",bg:"#F7FEE7", units:7, lectures:52, batch:2},
  {name:"ENT",           code:"C",  color:"#0891B2",bg:"#ECFEFF", units:4, lectures:65, batch:2},
  {name:"Ophthalmology", code:"Br", color:"#92400E",bg:"#FFFBEB", units:12,lectures:52, batch:2},
  {name:"FMT",           code:"Cr", color:"#BE123C",bg:"#FFF1F2", units:6, lectures:44, batch:3},
  {name:"PSM",           code:"Sg", color:"#047857",bg:"#ECFDF5", units:20,lectures:118,batch:3},
  {name:"Anesthesiology",code:"In", color:"#4338CA",bg:"#EEF2FF", units:4, lectures:28, batch:3},
  {name:"Orthopedics",   code:"Am", color:"#B45309",bg:"#FFFBEB", units:4, lectures:25, batch:3},
  {name:"Radiology",     code:"Sl", color:"#475569",bg:"#F8FAFC", units:3, lectures:42, batch:3},
  {name:"Psychiatry",    code:"Lv", color:"#6D28D9",bg:"#F5F3FF", units:4, lectures:22, batch:3},
  {name:"Dermatology",   code:"Ro", color:"#E11D48",bg:"#FFF1F2", units:4, lectures:26, batch:3},
];
const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII","XIX","XX","XXI","XXII"];
const OFFSETS = [1,3,7,14,28];
const OFF_COLOR = {1:"#ef4444",3:"#f97316",7:"#eab308",14:"#22c55e",28:"#3b82f6"};
const OFF_BG    = {1:"#fef2f2",3:"#fff7ed",7:"#fefce8",14:"#f0fdf4",28:"#eff6ff"};

// ─── SCHEDULE BUILD ──────────────────────────────────────────────────────────
function buildSchedule() {
  const subjects = SUBJECTS_RAW.map(s => {
    const lpd = Math.max(1, Math.ceil((s.lectures/s.units)/15));
    const studyDays = Math.ceil(s.lectures/lpd);
    const base = Math.floor(s.lectures/s.units), extra = s.lectures%s.units;
    const unitLectures = Array.from({length:s.units},(_,i)=>base+(i<extra?1:0));
    return {...s,lpd,studyDays,unitLectures};
  });
  const first4 = subjects.slice(0,4);
  const rest = [...subjects.slice(4)].sort((a,b)=>b.studyDays-a.studyDays);
  const ordered = [...first4,...rest];
  const slots = first4.map((s,i)=>({idx:i,endDay:s.studyDays}));
  const schedule = first4.map((s,i)=>({idx:i,startDay:1,endDay:s.studyDays}));
  rest.forEach((_,ri)=>{
    const qi=4+ri;
    const e=slots.reduce((a,b)=>a.endDay<=b.endDay?a:b);
    const start=e.endDay+1, s=ordered[qi], end=start+s.studyDays-1;
    e.endDay=end; e.idx=qi;
    schedule.push({idx:qi,startDay:start,endDay:end});
  });
  // day maps
  const sdm={};
  schedule.forEach(entry=>{
    const s=ordered[entry.idx], all=[];
    s.unitLectures.forEach((cnt,ui)=>{for(let li=1;li<=cnt;li++)all.push([ui+1,li]);});
    const dm={};let day=1,i=0;
    while(i<all.length){dm[day]=all.slice(i,i+s.lpd);i+=s.lpd;day++;}
    sdm[entry.idx]={map:dm,startDay:entry.startDay,endDay:entry.endDay};
  });
  const maxDay=Math.max(...schedule.map(e=>e.endDay));
  const gdp={}, rp={};
  for(let d=1;d<=maxDay;d++){
    const entries=[];
    schedule.forEach(entry=>{
      if(d>=entry.startDay&&d<=entry.endDay){
        const rel=d-entry.startDay+1;
        const lecs=sdm[entry.idx].map[rel]||[];
        if(lecs.length)entries.push({subjectIdx:entry.idx,lectures:lecs});
      }
    });
    gdp[d]=entries;
    entries.forEach(entry=>{
      entry.lectures.forEach(([unit,lec])=>{
        OFFSETS.forEach(offset=>{
          const rd=d+offset;
          if(!rp[rd])rp[rd]=[];
          rp[rd].push({subjectIdx:entry.subjectIdx,unit,lecture:lec,memDay:d,offset});
        });
      });
    });
  }
  return {subjects:ordered,schedule,gdp,rp,maxDay};
}

const {subjects,schedule,gdp,rp,maxDay} = buildSchedule();
const totalLectures = subjects.reduce((a,s)=>a+s.lectures,0);

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentDay = 1;
let completed = {}; // key: "subjectIdx-unit-lec" -> true
let currentTab = "today";

function saveToStorage(){
  try{
    localStorage.setItem("neet-day", JSON.stringify(currentDay));
    localStorage.setItem("neet-completed", JSON.stringify(completed));
    showSave("✓ saved");
  }catch(e){showSave("! error","#ef4444");}
}

function loadFromStorage(){
  try{
    const d=localStorage.getItem("neet-day");
    const c=localStorage.getItem("neet-completed");
    if(d) currentDay=JSON.parse(d);
    if(c) completed=JSON.parse(c);
  }catch(e){}
}

let saveTimer;
function showSave(msg,color="#22c55e"){
  const el=document.getElementById("save-status");
  el.textContent=msg; el.style.color=color;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{el.textContent="";},2000);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function isDone(si,u,l){return !!completed[`${si}-${u}-${l}`];}

function getSubjectProgress(idx){
  const s=subjects[idx];
  const done=Object.keys(completed).filter(k=>k.startsWith(`${idx}-`)&&completed[k]).length;
  return {done,total:s.lectures,pct:s.lectures?Math.round(done/s.lectures*100):0};
}

function getTotalDone(){return Object.values(completed).filter(Boolean).length;}

function makeTag(si,unit,lec,sm){
  const s=subjects[si];
  const sz=sm?"10px":"11px", psz=sm?"1px 6px":"3px 8px";
  return `<span class="tag" style="background:${s.bg};border-color:${s.color}30;color:${s.color};font-size:${sz};padding:${psz}"><span class="tag-code">${s.code}</span>·${ROMAN[unit-1]}·${lec}</span>`;
}

function makeOffBadge(offset){
  const labels={1:"+1d",3:"+3d",7:"+7d",14:"+14d",28:"+28d"};
  return `<span class="off-badge" style="background:${OFF_BG[offset]};color:${OFF_COLOR[offset]};border-color:${OFF_COLOR[offset]}40">${labels[offset]}</span>`;
}

function makeRing(pct,color,size=32){
  const r=(size-4)/2, circ=2*Math.PI*r, dash=circ*pct/100;
  return `<svg class="ring-wrap" width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("day-display").textContent=currentDay;
  const done=getTotalDone(), pct=Math.round(done/totalLectures*100);
  document.getElementById("progress-text").textContent=`${done}/${totalLectures} · ${pct}%`;
  document.getElementById("progress-fill").style.width=pct+"%";
  renderSlots();
  renderTab();
}

function renderSlots(){
  const active=schedule.filter(e=>e.startDay<=currentDay&&e.endDay>=currentDay);
  const grid=document.getElementById("slots-grid");
  grid.innerHTML=active.map(entry=>{
    const s=subjects[entry.idx], p=getSubjectProgress(entry.idx);
    const dLeft=entry.endDay-currentDay+1;
    return `<div class="slot-card" style="border-color:${s.color}25">
      <div class="slot-top">
        <div class="slot-dot" style="background:${s.color}"></div>
        <span class="slot-name">${s.name}</span>
        ${makeRing(p.pct,s.color,30)}
      </div>
      <div class="slot-meta">
        <span>${p.done}/${p.total}</span>
        <span style="color:${s.color}">${dLeft}d left</span>
      </div>
      <div class="slot-bar-track"><div class="slot-bar-fill" style="width:${p.pct}%;background:${s.color}"></div></div>
    </div>`;
  }).join("");
}

function renderTab(){
  const el=document.getElementById("tab-content");
  el.className="fade";
  void el.offsetWidth; // restart animation
  if(currentTab==="today") el.innerHTML=renderToday();
  else if(currentTab==="revision") el.innerHTML=renderRevision();
  else if(currentTab==="upcoming") el.innerHTML=renderUpcoming();
  else if(currentTab==="subjects") el.innerHTML=renderSubjects();
  // Bind checkbox clicks
  el.querySelectorAll(".lec-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const si=+row.dataset.si, u=+row.dataset.u, l=+row.dataset.l;
      const key=`${si}-${u}-${l}`;
      if(completed[key]) delete completed[key]; else completed[key]=true;
      saveToStorage();
      render();
    });
  });
}

function renderToday(){
  const mem=gdp[currentDay]||[];
  if(!mem.length) return `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No memorisation today</div></div>`;
  return mem.map(entry=>{
    const s=subjects[entry.subjectIdx];
    const allDone=entry.lectures.every(([u,l])=>isDone(entry.subjectIdx,u,l));
    const rows=entry.lectures.map(([unit,lec])=>{
      const done=isDone(entry.subjectIdx,unit,lec);
      const hint=done?`D${currentDay+1} D${currentDay+3} D${currentDay+7} D${currentDay+14} D${currentDay+28}`:"";
      return `<div class="lec-row" data-si="${entry.subjectIdx}" data-u="${unit}" data-l="${lec}">
        <div class="checkbox${done?" checked":""}" style="${done?"background:"+s.color:""}">
          <span class="checkbox-tick">✓</span>
        </div>
        ${makeTag(entry.subjectIdx,unit,lec,true)}
        <span class="lec-info">Unit ${ROMAN[unit-1]} · Lec ${lec}</span>
        ${hint?`<span class="rev-hint">${hint}</span>`:""}
      </div>`;
    }).join("");
    const donePill=allDone?`<span class="pill" style="background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0">✓ DONE</span>`:"";
    return `<div class="card" style="border-color:${allDone?"#22c55e40":s.color+"20"}">
      <div class="card-head" style="background:${s.bg};border-bottom-color:${s.color}15">
        <div class="card-stripe" style="background:${s.color}"></div>
        <span class="card-code" style="color:${s.color}">${s.code}</span>
        <span class="card-name">${s.name}</span>
        <span class="card-meta">${s.lpd} lec/day</span>
        ${donePill}
      </div>
      <div class="card-body">${rows}</div>
    </div>`;
  }).join("");
}

function renderRevision(){
  const rev=rp[currentDay]||[];
  if(!rev.length) return `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No revisions due today</div></div>`;
  const grouped={};
  rev.forEach(r=>{if(!grouped[r.subjectIdx])grouped[r.subjectIdx]=[];grouped[r.subjectIdx].push(r);});
  const header=`<div class="section-label">${rev.length} ITEMS DUE · DAY ${currentDay}</div>`;
  const cards=Object.entries(grouped).map(([idxStr,revs])=>{
    const idx=+idxStr, s=subjects[idx];
    const rows=revs.map(r=>`<div class="rev-row">
      ${makeTag(idx,r.unit,r.lecture,true)}
      ${makeOffBadge(r.offset)}
      <span style="margin-left:auto;font-size:9px;font-family:var(--mono);color:var(--faint)">mem D${r.memDay}</span>
    </div>`).join("");
    return `<div class="card" style="border-color:${s.color}20">
      <div class="card-head" style="background:${s.bg};border-bottom-color:${s.color}15">
        <div class="card-stripe" style="background:${s.color}"></div>
        <span class="card-code" style="color:${s.color}">${s.code}</span>
        <span class="card-name">${s.name}</span>
        <span class="card-meta">${revs.length} items</span>
      </div>
      <div class="card-body">${rows}</div>
    </div>`;
  }).join("");
  return header+cards;
}

function renderUpcoming(){
  const items=[];
  for(let d=currentDay+1;d<=currentDay+7;d++){
    const revs=rp[d]||[];
    if(revs.length) items.push({d,revs});
  }
  if(!items.length) return `<div class="empty"><div class="empty-text">Nothing in the next 7 days</div></div>`;
  return items.map(({d,revs})=>`
    <div class="upcoming-day">
      <span class="upcoming-day-pill">DAY ${d}</span>
      <span>${revs.length} revision${revs.length!==1?"s":""}</span>
    </div>
    <div class="upcoming-tags">
      ${revs.map(r=>`<div class="upcoming-item" style="border-color:${subjects[r.subjectIdx].color}20">
        ${makeTag(r.subjectIdx,r.unit,r.lecture,true)}
        ${makeOffBadge(r.offset)}
      </div>`).join("")}
    </div>
  `).join("");
}

function renderSubjects(){
  const sorted=[...schedule].sort((a,b)=>a.startDay-b.startDay);
  const cards=sorted.map(entry=>{
    const s=subjects[entry.idx], p=getSubjectProgress(entry.idx);
    const isActive=currentDay>=entry.startDay&&currentDay<=entry.endDay;
    const isDoneSubj=currentDay>entry.endDay;
    const badge=isActive?`<span class="pill" style="background:${s.color}15;color:${s.color};border:1px solid ${s.color}30">ACTIVE</span>`
      :isDoneSubj?`<span class="pill" style="background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0">✓</span>`:"";
    return `<div class="subj-card${isDoneSubj?" done":""}" style="border-color:${isActive?s.color+"40":"var(--border)"};background:${isActive?s.bg:"var(--surface)"}">
      <div class="subj-top">
        <div class="subj-dot" style="background:${isActive?s.color:isDoneSubj?"#cbd5e1":"#e2e8f0"}"></div>
        <span class="subj-code" style="color:${s.color}">${s.code}</span>
        <span class="subj-name">${s.name}</span>
        ${badge}
      </div>
      <div class="subj-meta">
        <span>D${entry.startDay} → D${entry.endDay} · ${s.lpd} lec/day</span>
        <span>${p.done}/${p.total} · ${p.pct}%</span>
      </div>
      <div class="subj-bar"><div class="subj-bar-fill" style="width:${p.pct}%;background:${s.color}"></div></div>
    </div>`;
  }).join("");

  const legend=`<div class="section-label">COLOUR CODES</div>
    <div class="legend-grid">
      ${subjects.map(s=>`<div class="legend-item" style="background:${s.bg};border-color:${s.color}20">
        <div class="legend-dot" style="background:${s.color}"></div>
        <span class="legend-code" style="color:${s.color}">${s.code}</span>
        <span class="legend-name">${s.name}</span>
      </div>`).join("")}
    </div>`;

  const revKey=`<div class="section-label">REVISION SCHEDULE</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${OFFSETS.map(o=>makeOffBadge(o)).join("")}
      <span style="font-size:10px;color:var(--faint);margin-left:4px">after each lecture</span>
    </div>`;

  return `<div class="section-label">FULL SCHEDULE · 19 SUBJECTS · 301 STUDY DAYS</div>${cards}${legend}${revKey}`;
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function changeDay(delta){
  currentDay=Math.max(1,currentDay+delta);
  saveToStorage();
  render();
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderTab();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromStorage();
render();
</script>
</body>
</html>
